name: Publish to npm (TS)

# 1) Manual trigger only. NO publish on push!
on:
  workflow_dispatch: 

permissions:
  contents: read
  id-token: write   # REQUIRED for OIDC Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    
    # Run all commands inside the ts-sdk folder
    defaults:
      run:
        working-directory: ./ts-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"  # IMPORTANT

      - name: Install dependencies
        run: npm ci

      # 2) Explicit build and test steps
      - name: Build project
        run: npm run build --if-present
        
      - name: Run tests
        run: npm test --if-present

      - name: Publish Package
        run: npm publish --access public