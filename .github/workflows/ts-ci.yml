name: CI Code Check (TS)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ts-sdk/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'ts-sdk/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22, 24]
    
    defaults:
      run:
        working-directory: ./ts-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Verify Build
        run: npm run build